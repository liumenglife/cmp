<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1100" viewBox="0 0 1600 1100" role="img" aria-labelledby="title desc">
  <title id="title">电子签章子模块架构图</title>
  <desc id="desc">展示合同主档作为业务真相源、文档中心作为文件真相源，审批通过后触发电子签章，签章结果回写合同主档摘要与时间线，并被归档、搜索与 AI 持续消费的关系图，同时标注数据流、状态流与回写流。</desc>
  <defs>
    <style>
      .bg { fill: #f7f9fc; }
      .panel { fill: #ffffff; stroke: #d7deea; stroke-width: 2; rx: 16; ry: 16; }
      .box { fill: #ffffff; stroke: #5b6b8a; stroke-width: 2; rx: 14; ry: 14; }
      .boxBlue { fill: #eef4ff; stroke: #4776e6; stroke-width: 2.5; rx: 16; ry: 16; }
      .boxGreen { fill: #ecfbf3; stroke: #2f8f5b; stroke-width: 2.5; rx: 16; ry: 16; }
      .boxOrange { fill: #fff5e8; stroke: #d9822b; stroke-width: 2.5; rx: 16; ry: 16; }
      .boxPurple { fill: #f4efff; stroke: #7a56c1; stroke-width: 2.5; rx: 16; ry: 16; }
      .title { font: 700 28px 'PingFang SC', 'Microsoft YaHei', sans-serif; fill: #1f2a44; }
      .subtitle { font: 700 20px 'PingFang SC', 'Microsoft YaHei', sans-serif; fill: #23314f; }
      .text { font: 16px 'PingFang SC', 'Microsoft YaHei', sans-serif; fill: #23314f; }
      .small { font: 14px 'PingFang SC', 'Microsoft YaHei', sans-serif; fill: #42526e; }
      .label { font: 700 14px 'PingFang SC', 'Microsoft YaHei', sans-serif; fill: #42526e; }
      .lineData { stroke: #4776e6; stroke-width: 3.5; fill: none; }
      .lineState { stroke: #d9822b; stroke-width: 3.5; fill: none; }
      .lineWriteback { stroke: #2f8f5b; stroke-width: 3.5; fill: none; }
      .dash { stroke-dasharray: 8 8; }
    </style>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4776e6" />
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#d9822b" />
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2f8f5b" />
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1600" height="1100" />
  <text class="title" x="800" y="56" text-anchor="middle">电子签章子模块架构图</text>
  <text class="small" x="800" y="88" text-anchor="middle">审批通过后触发签章；合同主档承接业务回写，文档中心承接文件回收，归档/搜索/AI 基于结果继续消费</text>

  <rect class="panel" x="48" y="128" width="1504" height="230" />
  <text class="subtitle" x="72" y="168">主链入口与真相源</text>

  <rect class="boxBlue" x="88" y="208" width="330" height="110" />
  <text class="text" x="253" y="246" text-anchor="middle">合同主档 / Contract Master</text>
  <text class="small" x="253" y="274" text-anchor="middle">业务真相源</text>
  <text class="small" x="253" y="298" text-anchor="middle">统一 contract_id、生命周期状态、业务摘要</text>

  <rect class="boxPurple" x="480" y="208" width="330" height="110" />
  <text class="text" x="645" y="246" text-anchor="middle">流程引擎 / 审批结果</text>
  <text class="small" x="645" y="274" text-anchor="middle">审批通过事实成立后才允许进入签章</text>
  <text class="small" x="645" y="298" text-anchor="middle">平台承接的审批结果是签章准入依据</text>

  <rect class="boxGreen" x="872" y="188" width="350" height="150" />
  <text class="text" x="1047" y="226" text-anchor="middle">文档中心 / Document Center</text>
  <text class="small" x="1047" y="254" text-anchor="middle">文件真相源</text>
  <text class="small" x="1047" y="278" text-anchor="middle">待签署文件、签章输入稿、签章结果稿、版本链</text>
  <text class="small" x="1047" y="302" text-anchor="middle">签章模块不自建第二套文件体系</text>

  <rect class="box" x="1284" y="208" width="220" height="110" />
  <text class="text" x="1394" y="246" text-anchor="middle">待签署文件</text>
  <text class="small" x="1394" y="274" text-anchor="middle">签章输入稿 / 指定版本</text>
  <text class="small" x="1394" y="298" text-anchor="middle">从文档中心受控读取</text>

  <rect class="panel" x="48" y="398" width="1504" height="420" />
  <text class="subtitle" x="72" y="438">电子签章运行时主链路</text>

  <rect class="boxOrange" x="520" y="500" width="560" height="180" />
  <text class="text" x="800" y="544" text-anchor="middle">电子签章子模块 / E-Signature</text>
  <text class="small" x="800" y="576" text-anchor="middle">签章申请准入、签署编排、印章控制、结果登记、验签治理</text>
  <text class="small" x="800" y="604" text-anchor="middle">只拥有签章专业状态，不拥有合同主档与文件真相源</text>
  <text class="small" x="800" y="632" text-anchor="middle">审批通过后读取签章输入稿，完成后回收结果并回写业务摘要与时间线</text>

  <rect class="box" x="120" y="500" width="280" height="110" />
  <text class="text" x="260" y="538" text-anchor="middle">签章触发条件</text>
  <text class="small" x="260" y="566" text-anchor="middle">合同处于允许签章状态</text>
  <text class="small" x="260" y="590" text-anchor="middle">审批通过且前置文件版本有效</text>

  <rect class="box" x="1200" y="500" width="270" height="110" />
  <text class="text" x="1335" y="538" text-anchor="middle">签章结果回收</text>
  <text class="small" x="1335" y="566" text-anchor="middle">签章结果稿 / 验签结果摘要</text>
  <text class="small" x="1335" y="590" text-anchor="middle">回收到文档中心版本链</text>

  <rect class="box" x="120" y="662" width="300" height="110" />
  <text class="text" x="270" y="700" text-anchor="middle">合同主档回写</text>
  <text class="small" x="270" y="728" text-anchor="middle">签署状态、完成时间、结果摘要</text>
  <text class="small" x="270" y="752" text-anchor="middle">写入合同摘要与合同时间线</text>

  <rect class="panel" x="48" y="858" width="1504" height="192" />
  <text class="subtitle" x="72" y="898">后续消费与图例</text>

  <rect class="box" x="84" y="930" width="230" height="78" />
  <text class="text" x="199" y="968" text-anchor="middle">归档</text>
  <text class="small" x="199" y="992" text-anchor="middle">消费签章结果稿与合同摘要</text>

  <rect class="box" x="354" y="930" width="230" height="78" />
  <text class="text" x="469" y="968" text-anchor="middle">搜索</text>
  <text class="small" x="469" y="992" text-anchor="middle">消费签署状态、完成时间、受控文件摘要</text>

  <rect class="box" x="624" y="930" width="230" height="78" />
  <text class="text" x="739" y="968" text-anchor="middle">AI</text>
  <text class="small" x="739" y="992" text-anchor="middle">消费合同摘要与必要签章结果摘要</text>

  <line class="lineData" x1="930" y1="954" x2="1000" y2="954" marker-end="url(#arrowBlue)" />
  <text class="small" x="1020" y="960">数据流</text>
  <line class="lineState dash" x1="1130" y1="954" x2="1200" y2="954" marker-end="url(#arrowOrange)" />
  <text class="small" x="1220" y="960">状态流</text>
  <line class="lineWriteback dash" x1="1320" y1="954" x2="1390" y2="954" marker-end="url(#arrowGreen)" />
  <text class="small" x="1410" y="960">回写流</text>

  <text class="small" x="930" y="1000">硬性边界：合同主档是业务真相源；文档中心是文件真相源；电子签章负责签章专业语义与回写编排。</text>

  <path class="lineState" d="M 645 318 L 645 462 L 720 462" marker-end="url(#arrowOrange)" />
  <text class="label" x="670" y="450">审批通过后触发</text>

  <path class="lineData" d="M 1222 262 L 1284 262" marker-end="url(#arrowBlue)" />
  <text class="label" x="1238" y="248">输入稿定位</text>

  <path class="lineData" d="M 1284 318 C 1230 390, 1150 470, 1075 552" marker-end="url(#arrowBlue)" />
  <text class="label" x="1205" y="416">受控读取签章输入稿</text>

  <path class="lineData" d="M 418 262 C 520 262, 600 400, 700 500" marker-end="url(#arrowBlue)" />
  <text class="label" x="452" y="248">合同上下文</text>

  <path class="lineData" d="M 253 318 C 253 410, 460 470, 520 544" marker-end="url(#arrowBlue)" />
  <text class="label" x="332" y="430">发起签章申请</text>

  <path class="lineState dash" d="M 400 554 L 520 554" marker-end="url(#arrowOrange)" />
  <text class="label" x="432" y="540">准入状态判断</text>

  <path class="lineWriteback dash" d="M 1080 590 C 1135 590, 1160 590, 1200 555" marker-end="url(#arrowGreen)" />
  <text class="label" x="1135" y="576">结果文件回收</text>

  <path class="lineWriteback dash" d="M 520 640 C 470 670, 420 690, 420 717" marker-end="url(#arrowGreen)" />
  <text class="label" x="430" y="666">结果摘要与时间线回写</text>

  <path class="lineWriteback dash" d="M 260 662 C 260 620, 253 380, 253 318" marker-end="url(#arrowGreen)" />
  <text class="label" x="286" y="438">更新业务摘要</text>

  <path class="lineWriteback dash" d="M 1335 610 C 1335 760, 880 760, 260 760" marker-end="url(#arrowGreen)" />
  <text class="label" x="980" y="746">结果回收完成后驱动主链闭环</text>

  <path class="lineData" d="M 270 930 C 270 860, 270 820, 270 772" marker-end="url(#arrowBlue)" />
  <path class="lineData" d="M 469 930 C 469 860, 320 840, 270 772" marker-end="url(#arrowBlue)" />
  <path class="lineData" d="M 739 930 C 739 860, 430 840, 270 772" marker-end="url(#arrowBlue)" />
  <path class="lineData" d="M 199 930 C 199 860, 780 820, 1335 610" marker-end="url(#arrowBlue)" />
  <path class="lineData" d="M 469 930 C 469 860, 920 820, 1335 610" marker-end="url(#arrowBlue)" />
  <path class="lineData" d="M 739 930 C 739 860, 1000 820, 1335 610" marker-end="url(#arrowBlue)" />
</svg>
