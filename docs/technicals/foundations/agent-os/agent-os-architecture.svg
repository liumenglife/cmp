<svg xmlns="http://www.w3.org/2000/svg" width="1760" height="1280" viewBox="0 0 1760 1280">
  <defs>
    <style>
      .title { font: 700 30px Arial, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #0f172a; }
      .subtitle { font: 600 18px Arial, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #0f172a; }
      .label { font: 500 15px Arial, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #0f172a; }
      .small { font: 500 13px Arial, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #334155; }
      .tiny { font: 500 12px Arial, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #475569; }
      .box { rx: 18; ry: 18; stroke-width: 2; }
      .plane { rx: 22; ry: 22; stroke-width: 2.4; }
      .line { stroke: #475569; stroke-width: 2.2; fill: none; }
      .dash { stroke-dasharray: 8 6; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1760" height="1280" fill="#f8fafc"/>
  <text x="880" y="48" text-anchor="middle" class="title">Agent OS：QueryEngine 驱动的企业业务 Harness 架构图</text>
  <text x="880" y="78" text-anchor="middle" class="small">面向合同管理平台，覆盖合同、审批、文档、签署、履约、风控、业务用户、管理端、运维审计。</text>

  <rect x="40" y="130" width="310" height="700" class="plane" fill="#dbeafe" stroke="#2563eb"/>
  <text x="195" y="166" text-anchor="middle" class="subtitle">业务输入</text>
  <text x="70" y="208" class="label">• 合同起草 / 审查</text>
  <text x="70" y="246" class="label">• 审批流辅助</text>
  <text x="70" y="284" class="label">• 文档比对 / 条款抽取</text>
  <text x="70" y="322" class="label">• 签署状态</text>
  <text x="70" y="360" class="label">• 履约风险</text>
  <text x="70" y="398" class="label">• 风控预警</text>
  <text x="70" y="436" class="label">• 运维审计事件</text>
  <rect x="70" y="500" width="250" height="260" class="box" fill="#eff6ff" stroke="#60a5fa"/>
  <text x="195" y="535" text-anchor="middle" class="subtitle">企业业务系统定位</text>
  <text x="95" y="575" class="small">合同、审批、文档、签署、履约、</text>
  <text x="95" y="604" class="small">风控、业务用户、管理端与</text>
  <text x="95" y="633" class="small">运维审计统一进入运行时。</text>
  <text x="95" y="678" class="small">业务模块提交目标与上下文，</text>
  <text x="95" y="707" class="small">不直接绑定模型或 Provider。</text>

  <rect x="410" y="120" width="940" height="760" class="plane" fill="#eef2ff" stroke="#4f46e5"/>
  <text x="880" y="158" text-anchor="middle" class="title">Harness Kernel</text>
  <text x="880" y="188" text-anchor="middle" class="small">薄 Harness 内核：确定性边界、上下文治理、工具治理、检查点与终止条件</text>

  <rect x="470" y="230" width="820" height="430" class="plane" fill="#ffffff" stroke="#7c3aed"/>
  <text x="880" y="268" text-anchor="middle" class="subtitle">QueryEngine Runtime Loop</text>
  <text x="880" y="295" text-anchor="middle" class="small">while loop + tools + observations + checkpoint / termination</text>

  <rect x="505" y="330" width="135" height="62" class="box" fill="#ede9fe" stroke="#7c3aed"/>
  <text x="572" y="366" text-anchor="middle" class="small">Task Ingress</text>
  <rect x="675" y="330" width="150" height="62" class="box" fill="#ede9fe" stroke="#7c3aed"/>
  <text x="750" y="366" text-anchor="middle" class="small">Context Governor</text>
  <rect x="860" y="330" width="150" height="62" class="box" fill="#ede9fe" stroke="#7c3aed"/>
  <text x="935" y="366" text-anchor="middle" class="small">Prompt Assembly</text>
  <rect x="1045" y="330" width="150" height="62" class="box" fill="#ede9fe" stroke="#7c3aed"/>
  <text x="1120" y="366" text-anchor="middle" class="small">Provider Budget</text>

  <rect x="1045" y="445" width="150" height="62" class="box" fill="#ede9fe" stroke="#7c3aed"/>
  <text x="1120" y="481" text-anchor="middle" class="small">Tool Decision</text>
  <rect x="860" y="445" width="150" height="62" class="box" fill="#ede9fe" stroke="#7c3aed"/>
  <text x="935" y="481" text-anchor="middle" class="small">Guard Chain</text>
  <rect x="675" y="445" width="150" height="62" class="box" fill="#ede9fe" stroke="#7c3aed"/>
  <text x="750" y="481" text-anchor="middle" class="small">Sandbox Executor</text>
  <rect x="505" y="445" width="135" height="62" class="box" fill="#ede9fe" stroke="#7c3aed"/>
  <text x="572" y="474" text-anchor="middle" class="tiny">Observation</text>
  <text x="572" y="491" text-anchor="middle" class="tiny">Normalize</text>

  <rect x="675" y="555" width="150" height="62" class="box" fill="#ede9fe" stroke="#7c3aed"/>
  <text x="750" y="591" text-anchor="middle" class="small">Memory Intake</text>
  <rect x="860" y="555" width="170" height="62" class="box" fill="#ede9fe" stroke="#7c3aed"/>
  <text x="945" y="580" text-anchor="middle" class="tiny">Checkpoint /</text>
  <text x="945" y="598" text-anchor="middle" class="tiny">Termination</text>
  <rect x="1060" y="535" width="205" height="112" class="box" fill="#fff7ed" stroke="#f97316"/>
  <text x="1162" y="568" text-anchor="middle" class="tiny">Cross-Session Delegation Coordinator</text>
  <text x="1080" y="602" class="tiny">• Leader-Teammate</text>
  <text x="1080" y="621" class="tiny">• 独立 Session / 最小必要上下文</text>
  <text x="1080" y="640" class="tiny">• 结果摘要 / 证据回收</text>

  <path d="M 640 361 L 675 361" class="line" marker-end="url(#arrow)"/>
  <path d="M 825 361 L 860 361" class="line" marker-end="url(#arrow)"/>
  <path d="M 1010 361 L 1045 361" class="line" marker-end="url(#arrow)"/>
  <path d="M 1120 392 L 1120 445" class="line" marker-end="url(#arrow)"/>
  <path d="M 1045 476 L 1010 476" class="line" marker-end="url(#arrow)"/>
  <path d="M 860 476 L 825 476" class="line" marker-end="url(#arrow)"/>
  <path d="M 675 476 L 640 476" class="line" marker-end="url(#arrow)"/>
  <path d="M 572 507 C 572 575 630 586 675 586" class="line" marker-end="url(#arrow)"/>
  <path d="M 825 586 L 860 586" class="line" marker-end="url(#arrow)"/>
  <path d="M 1030 586 C 1210 586 1240 310 1120 310 L 572 310 C 510 310 505 332 505 361" class="line dash" marker-end="url(#arrow)"/>
  <path d="M 1120 507 L 1120 535" class="line" marker-end="url(#arrow)"/>
  <path d="M 1060 595 C 870 625 700 560 640 493" class="line" marker-end="url(#arrow)"/>
  <path d="M 1060 630 C 960 670 900 700 880 710" class="line" marker-end="url(#arrow)"/>
  <path d="M 1060 612 C 960 640 850 630 825 595" class="line dash" marker-end="url(#arrow)"/>
  <text x="915" y="642" text-anchor="middle" class="tiny">团队记忆同步</text>

  <rect x="455" y="710" width="250" height="115" class="box" fill="#fefce8" stroke="#ca8a04"/>
  <text x="580" y="745" text-anchor="middle" class="subtitle">State Checkpoint</text>
  <text x="485" y="780" class="small">• 风险、成本、动作、观察</text>
  <text x="485" y="807" class="small">• 终止判断与恢复锚点</text>
  <rect x="755" y="710" width="250" height="115" class="box" fill="#f0fdfa" stroke="#0f766e"/>
  <text x="880" y="745" text-anchor="middle" class="subtitle">Result Sink</text>
  <text x="785" y="780" class="small">• 业务可消费结果对象</text>
  <text x="785" y="807" class="small">• 状态回写与异常回收</text>
  <rect x="1055" y="710" width="250" height="115" class="box" fill="#fff7ed" stroke="#ea580c"/>
  <text x="1180" y="745" text-anchor="middle" class="subtitle">Persona Strategy</text>
  <text x="1085" y="780" class="small">• 通用人格底板</text>
  <text x="1085" y="807" class="small">• 专用业务任务策略</text>

  <!-- Search label: Tool & Execution Plane -->
  <rect x="410" y="930" width="430" height="280" class="plane" fill="#ecfeff" stroke="#0891b2"/>
  <text x="625" y="966" text-anchor="middle" class="subtitle">Tool &amp; Execution Plane</text>
  <text x="450" y="1008" class="label">• Tool Registry</text>
  <text x="450" y="1042" class="label">• ToolSearch</text>
  <text x="450" y="1076" class="label">• Sandbox Executor</text>
  <text x="450" y="1110" class="label">• Output Offloader</text>
  <text x="450" y="1144" class="label">• Model Provider as Tool</text>
  <text x="450" y="1178" class="small">工具、模型和外部系统都通过授权边界执行。</text>

  <rect x="920" y="930" width="430" height="280" class="plane" fill="#f0fdf4" stroke="#16a34a"/>
  <text x="1135" y="966" text-anchor="middle" class="subtitle">Context Plane</text>
  <text x="960" y="1008" class="label">• Prompt Assembly</text>
  <text x="960" y="1042" class="label">• Context Governor</text>
  <text x="960" y="1076" class="label">• Active Recall</text>
  <text x="960" y="1110" class="label">• Memory Intake</text>
  <text x="960" y="1144" class="label">• 压缩 / 冲洗</text>
  <text x="960" y="1178" class="small">每轮只保留高信噪比上下文和可追溯引用。</text>

  <rect x="40" y="890" width="310" height="320" class="plane" fill="#fef2f2" stroke="#dc2626"/>
  <text x="195" y="926" text-anchor="middle" class="subtitle">Governance Plane</text>
  <text x="70" y="968" class="label">• Deterministic Guard</text>
  <text x="70" y="1002" class="label">• LLM Judge</text>
  <text x="70" y="1036" class="label">• Human Confirmation 第 3 层</text>
  <text x="70" y="1070" class="label">• Verification Agent</text>
  <text x="70" y="1104" class="label">• 审计 / 配额</text>
  <text x="70" y="1148" class="small">高风险动作先治理，再执行。</text>

  <rect x="1410" y="890" width="310" height="320" class="plane" fill="#f5f3ff" stroke="#7c3aed"/>
  <text x="1565" y="926" text-anchor="middle" class="subtitle">Evolution Plane</text>
  <text x="1440" y="968" class="label">• Auto Dream</text>
  <text x="1440" y="1002" class="label">• Memory Asset</text>
  <text x="1440" y="1036" class="label">• Skill Asset</text>
  <text x="1440" y="1070" class="label">• Pattern Asset</text>
  <text x="1440" y="1104" class="label">• persona_phase</text>
  <text x="1440" y="1138" class="label">• Leader-Teammate</text>
  <text x="1440" y="1178" class="small">经验异步沉淀，灰度后再进入资产库。</text>

  <rect x="1410" y="130" width="310" height="700" class="plane" fill="#dcfce7" stroke="#16a34a"/>
  <text x="1565" y="166" text-anchor="middle" class="subtitle">业务输出</text>
  <text x="1440" y="208" class="label">• 合同风险摘要</text>
  <text x="1440" y="246" class="label">• 审批建议 / 确认</text>
  <text x="1440" y="284" class="label">• 签署异常处置</text>
  <text x="1440" y="322" class="label">• 履约预警</text>
  <text x="1440" y="360" class="label">• 风控告警</text>
  <text x="1440" y="398" class="label">• 审计回放</text>
  <text x="1440" y="436" class="label">• 业务模块状态回写</text>
  <rect x="1440" y="500" width="250" height="260" class="box" fill="#f0fdf4" stroke="#86efac"/>
  <text x="1565" y="535" text-anchor="middle" class="subtitle">可审计交付</text>
  <text x="1465" y="575" class="small">输出只暴露业务结果、证据、</text>
  <text x="1465" y="604" class="small">风险解释、确认状态与回放线索，</text>
  <text x="1465" y="633" class="small">不外泄内部 Prompt 快照。</text>
  <text x="1465" y="678" class="small">合同、审批、签署、履约、</text>
  <text x="1465" y="707" class="small">风控和运维审计统一回写。</text>

  <path d="M 350 360 L 505 360" class="line" marker-end="url(#arrow)"/>
  <path d="M 1290 360 L 1410 360" class="line" marker-end="url(#arrow)"/>
  <path d="M 625 930 L 710 660" class="line dash" marker-end="url(#arrow)"/>
  <path d="M 1135 930 L 900 660" class="line dash" marker-end="url(#arrow)"/>
  <path d="M 350 1050 L 860 505" class="line dash" marker-end="url(#arrow)"/>
  <path d="M 1410 1050 L 1030 615" class="line dash" marker-end="url(#arrow)"/>
  <path d="M 1060 647 C 785 780 475 960 350 1068" class="line dash" marker-end="url(#arrow)"/>
  <text x="695" y="810" text-anchor="middle" class="tiny">冲突转 Verification Agent</text>
  <path d="M 1005 768 L 1410 530" class="line" marker-end="url(#arrow)"/>
  <path d="M 705 768 L 350 530" class="line dash" marker-end="url(#arrow)"/>
</svg>
